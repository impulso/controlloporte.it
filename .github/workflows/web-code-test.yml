name: Web

on:
  pull_request:
    paths:
      - frontend/**

env:
  NODE_VERSION: "25"
  PKG_DIR: "frontend/web"

jobs:
  prettier:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PKG_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: ${{ env.PKG_DIR }}/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Prettier (check only)
        run: yarn prettier

  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PKG_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: ${{ env.PKG_DIR }}/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint --max-warnings=0

  jest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PKG_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: ${{ env.PKG_DIR }}/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Jest
        run: yarn test